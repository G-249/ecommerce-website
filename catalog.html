<!DOCTYPE html>
<html>
<head>
<title>Catalog</title>

<link rel="stylesheet" href="catalog.css">

</head>

<body>

<header>
<h1>Product Catalog</h1>
</header>

<div class="product-grid">

<div class="product-item">
<img src="images/books.png">
<h3>Books</h3>
<p>$20</p>
<button onclick="addToCart('Books',20)">Add to Cart</button>
</div>

<div class="product-item">
<img src="images/groceries.png">
<h3>Groceries</h3>
<p>$15</p>
<button onclick="addToCart('Groceries',15)">Add to Cart</button>
</div>

<div class="product-item">
<img src="images/makeup.png">
<h3>Makeup</h3>
<p>$30</p>
<button onclick="addToCart('Makeup',30)">Add to Cart</button>
</div>

</div>

<button onclick="viewCart()">View Cart</button>

<script>

function addToCart(name,price){

let cart=JSON.parse(localStorage.getItem("cart"))||[];

cart.push({name,price});

localStorage.setItem("cart",JSON.stringify(cart));

alert("Added to cart");

}

function viewCart(){

window.location.href="cart.html";

}

</script>

</body>
</html>
