<!DOCTYPE html>
<html>
<head>
<title>Cart</title>
</head>

<body>

<h2>Shopping Cart</h2>

<ul id="cartItems"></ul>

<script>

let cart=JSON.parse(localStorage.getItem("cart"))||[];

let list=document.getElementById("cartItems");

cart.forEach(item=>{

let li=document.createElement("li");

li.textContent=item.name+" - $"+item.price;

list.appendChild(li);

});

</script>

</body>
</html>
